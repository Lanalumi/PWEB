        function AlunoADS(){
            var numLab;
            this.setnumLab = function(value){

        alert(aluno7.getNome() + " " + aluno7.getnumLab());

        class Aluno1 {
            constructor(){
                this._ra;
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa(value){
                this._ra = value;
            }
            getRa(){
                return this._ra;
            }
        }

        var objAluno = new Aluno1();
        objAluno.setNome("Caroline");
        objAluno.setRa("123");
        alert(`nome=${objAluno.getNome()} ra=${objAluno.getRa()}`);
        
        class AlunoADS1 extends Aluno1{
            constructor(){
                super();
                this.numLab;
            }
            setNumLab(value){

            }
            getNumLab(){

            }
        }
        var objAlunoADS = new AlunoADS1();

        //metodos e atributos - publicos e privados
        class ContaBancaria{
            #cpf; //atributo privado

            constructor(nome,saldoInicial){
                this.nome = nome; //atributo publico
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.cpf = value;
            }

            getCpf(){
                return this.cpf;
            }
            getSaldo(){
                return this.saldo;
            }
            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor); //utilizando o modificador # para metodo privado
            }

            #registrarTransacao(valor){
                console.log(`Deposito de R$ ${valor} realizado pelo ${this.nome} e o Saldo R$ ${this.saldo} para cpf ${this.getCpf()} ou ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(500);
